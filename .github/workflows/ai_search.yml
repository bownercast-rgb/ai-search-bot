name: AI Scheduled Search

on:
  schedule:
    # 每天北京时间上午 8:00 自动运行 (对应 UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 界面手动点击 "Run workflow" 进行测试

jobs:
  search_and_report:
    runs-on: ubuntu-latest
    
    # 授予工作流写入权限，以便它可以将搜索结果存回仓库
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Gemini Search Script
        env:
          # 从 GitHub Secrets 中读取你的 API Key
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_search.py

      - name: Commit and Push Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 只有当生成了新的报告文件时才提交
          if [ -f "latest_report.md" ]; then
            git add latest_report.md
            git commit -m "Update AI search report [skip ci]" || echo "No changes to commit"
            git push
          fi
